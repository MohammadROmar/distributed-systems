services:

  # ── Nginx: sits in front of everything ──────────────────────
  # The single entry point on port 80.
  # Reads its config from ./nginx/nginx.conf (mounted read-only).
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3

  # ── Three identical instances of the fault-tolerance app ────
  # Docker gives each one its own internal IP; nginx balances between them.
  # INSTANCE_ID is visible in the X-Upstream response header nginx adds,
  # so you can see which backend handled each request.
  app-1:
    build: .
    environment:
      INSTANCE_ID: "1"

  app-2:
    build: .
    environment:
      INSTANCE_ID: "2"

  app-3:
    build: .
    environment:
      INSTANCE_ID: "3"
